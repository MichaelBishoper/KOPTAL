services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: koptal
      POSTGRES_PASSWORD: koptal_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koptal"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../../apps/api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - iam
      - category
      - inventory
      - procurement
      - logistics
      - rating
      - fileupload

  iam:
    build:
      context: ../../services/iam
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_iam
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  category:
    build:
      context: ../../services/category
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_category
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory:
    build:
      context: ../../services/inventory
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_inventory
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  procurement:
    build:
      context: ../../services/procurement
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_procurement
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  logistics:
    build:
      context: ../../services/logistics
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_logistics
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rating:
    build:
      context: ../../services/rating
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: koptal
      PG_PASSWORD: koptal_dev
      PG_DATABASE: db_rating
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fileupload:
    build:
      context: ../../services/fileUpload
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: koptal
      DB_PASSWORD: koptal_dev
      DB_NAME: db_fileupload
      UPLOAD_DIR: /app/src/uploads/
      BASE_URL: http://localhost:3007
    volumes:
      - uploaddata:/app/src/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmqdata:
  uploaddata:
