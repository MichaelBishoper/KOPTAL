version: '3.8'

services:
  db_iam:
    image: postgres:15-alpine
    container_name: koptal_db_iam
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal_iam
    ports:
      - "5433:5432"
    volumes:
      - pg_data_iam:/var/lib/postgresql/data
      - ./infrastructure/docker/init_iam.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  db_files:
    image: postgres:15-alpine
    container_name: koptal_db_files
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal_files
    ports:
      - "5435:5432"
    volumes:
      - pg_data_files:/var/lib/postgresql/data
      - ./infrastructure/docker/init_files.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  iam:
    build:
      context: ./services/iam
    container_name: koptal_iam
    ports:
      - "3001:3001"
    volumes:
      - ./services/iam:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - PG_HOST=db_iam
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal_iam
      - JWT_SECRET=some_test_secret
    depends_on:
      - db_iam
    restart: unless-stopped

  fileupload:
    build:
      context: ./services/fileUpload
    container_name: koptal_fileupload
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - UPLOAD_DIR=/app/src/uploads/
      - DB_HOST=db_files
      - DB_NAME=koptal_files
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - BASE_URL=http://localhost:3002
    volumes:
      - ./services/fileUpload:/app
      - /app/node_modules
      - ./uploads:/app/src/uploads/
    depends_on:
      - db_files
    restart: unless-stopped

  db_order:
    image: postgres:15-alpine
    container_name: koptal_db_order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal_order
    ports:
      - "5436:5432"
    volumes:
      - pg_data_order:/var/lib/postgresql/data
      - ./infrastructure/docker/init_order.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  db_inventory:
    image: postgres:15-alpine
    container_name: koptal_db_inventory
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal_inventory
    ports:
      - "5437:5432"
    volumes:
      - pg_data_inventory:/var/lib/postgresql/data
      - ./infrastructure/docker/init_inventory.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  order:
    build:
      context: ./services/order
    container_name: koptal_order
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - PG_HOST=db_order
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal_order
      - JWT_SECRET=some_test_secret
      - INVENTORY_SERVICE_URL=http://inventory:4001
    volumes:
      - ./services/order:/app
      - /app/node_modules
    depends_on:
      - db_order
      - inventory
    restart: unless-stopped

  inventory:
    build:
      context: ./services/inventory
    container_name: koptal_inventory
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - PG_HOST=db_inventory
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal_inventory
      - JWT_SECRET=some_test_secret
    volumes:
      - ./services/inventory:/app
      - /app/node_modules
    depends_on:
      - db_inventory
    restart: unless-stopped

  db_adminconf:
    image: postgres:15-alpine
    container_name: koptal_db_adminconf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal_adminconf
    ports:
      - "5438:5432"
    volumes:
      - pg_data_adminconf:/var/lib/postgresql/data
      - ./infrastructure/docker/init_adminconf.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  adminconf:
    build:
      context: ./services/adminconf
    container_name: koptal_adminconf
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - PG_HOST=db_adminconf
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal_adminconf
      - JWT_SECRET=some_test_secret
      - INVENTORY_SERVICE_URL=http://inventory:4001
    volumes:
      - ./services/adminconf:/app
      - /app/node_modules
    depends_on:
      - db_adminconf
      - inventory
    restart: unless-stopped

volumes:
  pg_data_iam:
  pg_data_files:
  pg_data_order:
  pg_data_inventory:
  pg_data_adminconf:
