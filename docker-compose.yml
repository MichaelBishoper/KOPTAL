version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: koptal_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: koptal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  iam:
    build:
      context: ./services/iam
    container_name: koptal_iam
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal
      - JWT_SECRET=some_test_secret
    depends_on:
      - db
    restart: unless-stopped

  monolith:
    build:
      context: ./services/monolith
    container_name: koptal_monolith
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=password123
      - PG_DATABASE=koptal
      - JWT_SECRET=some_test_secret
    depends_on:
      - db
    restart: unless-stopped

  fileupload:
    build:
      context: ./services/fileUpload
    container_name: koptal_fileupload
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - UPLOAD_DIR=/app/src/uploads/
      - DB_HOST=db
      - DB_NAME=koptal
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - BASE_URL=http://localhost:3002
    volumes:
      - fileupload_data:/app/src/uploads/
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  fileupload_data:
